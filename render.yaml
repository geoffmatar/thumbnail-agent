services:
  - type: web
    name: zoomex-thumbnail-agent
    env: python
    plan: free
    buildCommand: python3 -m pip install -r requirements.txt
    startCommand: python3 thumbnail_agent.py serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5

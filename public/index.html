<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thumbnail Agent</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="home-mode">
    <main id="homeView" class="home-shell">
      <section class="home-hero">
        <div class="home-copy">
          <img class="home-logo" src="/1000media-logo.png" alt="1000media">
          <div class="home-heading">
            <h1 class="home-title">Thumbnail Creator</h1>
            <p class="home-subtitle">Choose an agent and create high-quality thumbnails</p>
          </div>
        </div>

        <div class="project-grid" aria-label="Thumbnail projects">
          <button id="openZoomex" class="project-tile" type="button" aria-label="Open Zoomex">
            <span class="project-logo-wrap">
              <img class="project-logo" src="/zoomex-card-logo.png" alt="ZOOMEX">
            </span>
            <span class="project-copy">
              <span class="project-name">Zoomex</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-action" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 12h14"></path>
                <path d="m13 6 6 6-6 6"></path>
              </svg>
            </span>
          </button>

          <button id="openAlliance" class="project-tile" type="button" aria-label="Open Alliance Latin">
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/alliance-latin-card-logo.png" alt="Alliance Latin">
            </span>
            <span class="project-copy">
              <span class="project-name">Alliance Latin</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-action" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 12h14"></path>
                <path d="m13 6 6 6-6 6"></path>
              </svg>
            </span>
          </button>

          <button id="openAllianceBlack" class="project-tile" type="button" aria-label="Open Alliance Black">
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/alliance-black-card-logo.png" alt="Alliance Black">
            </span>
            <span class="project-copy">
              <span class="project-name">Alliance Black</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-action" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 12h14"></path>
                <path d="m13 6 6 6-6 6"></path>
              </svg>
            </span>
          </button>

          <button id="openAllianceLgbtq" class="project-tile" type="button" aria-label="Open Alliance LGBTQ">
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/alliance-lgbtq-card-logo.png" alt="Alliance LGBTQ">
            </span>
            <span class="project-copy">
              <span class="project-name">Alliance LGBTQ</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-action" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 12h14"></path>
                <path d="m13 6 6 6-6 6"></path>
              </svg>
            </span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/builders-middle-east-card-logo.png" alt="Builders Middle East">
            </span>
            <span class="project-copy">
              <span class="project-name">Builders Middle East</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-status">Coming soon</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/leverage-card-logo.png" alt="Leverage Edu">
            </span>
            <span class="project-copy">
              <span class="project-name">Leverage Edu</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-status">Coming soon</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/abh-card-logo.png" alt="Africa Business Heroes">
            </span>
            <span class="project-copy">
              <span class="project-name">Africa Business Heroes</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-status">Coming soon</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/interfaith-card-logo.png" alt="Interfaith">
            </span>
            <span class="project-copy">
              <span class="project-name">Interfaith</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-status">Coming soon</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/dentiste-card-logo.png" alt="Dentiste">
            </span>
            <span class="project-copy">
              <span class="project-name">Dentiste</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-status">Coming soon</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/siyata-card-logo.png" alt="Siyata">
            </span>
            <span class="project-copy">
              <span class="project-name">Siyata</span>
              <span class="project-role">Agent</span>
            </span>
            <span class="project-status">Coming soon</span>
          </button>
        </div>
      </section>
    </main>

    <main id="zoomexView" class="app-shell" hidden>
      <section class="workspace">
        <header class="topbar">
          <div class="brand-lockup">
            <button id="backHome" class="home-back" type="button" aria-label="Back to home">
              <svg class="home-back-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 10.5 12 4l8 6.5v8a1.5 1.5 0 0 1-1.5 1.5H15v-6H9v6H5.5A1.5 1.5 0 0 1 4 18.5z"></path>
              </svg>
              <span>1000media</span>
            </button>
            <img id="studioLogo" class="studio-logo" src="/zoomex-logo.png" alt="ZOOMEX">
            <div class="brand-meta">
              <h1 id="studioTitle">Thumbnail agent</h1>
            </div>
            <p id="statusLine" class="sr-only" aria-live="polite">Checking setup...</p>
          </div>
          <div id="progressPanel" class="progress-panel">
            <div class="progress-head">
              <span id="progressLabel">Ready to create.</span>
              <span id="progressPercent">0%</span>
            </div>
            <div class="progress-track" aria-hidden="true">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressMeta" class="progress-meta">Add a title and script, then create a thumbnail.</div>
          </div>
        </header>

        <section class="studio-layout">
          <section class="panel control-panel">
            <div class="grid">
              <label class="dropzone title-card">
                <span>Title</span>
                <input id="titleInput" type="text" autocomplete="off" placeholder="Enter the title here...">
                <small>Use | to force the line break.</small>
              </label>
            </div>

            <div class="dropzone script-card">
              <span>Script</span>
              <textarea id="scriptText" rows="15" placeholder="Paste your script here..."></textarea>
            </div>

            <label class="dropzone reference-card" for="personReference">
              <span>Person Reference (Optional)</span>
              <input id="personReference" type="file" accept="image/*">
              <span id="referenceFileName" class="reference-button">Upload image</span>
              <small>Want a specific person? Upload their photo.</small>
            </label>

          </section>

          <section class="result-panel">
            <div class="create-panel">
              <button id="createBtn" class="primary-btn" type="button">Create Thumbnail</button>
            </div>

            <div class="preview-stage">
              <div id="previewWrap" class="preview-wrap" data-placeholder="ZOOMEX">
                <img id="preview" alt="Generated thumbnail preview">
              </div>
              <a id="downloadLink" class="secondary-btn" href="#" download hidden>Download PNG</a>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>

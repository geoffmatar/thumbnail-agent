<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thumbnail Agent</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="home-mode">
    <main id="homeView" class="home-shell">
      <section class="home-hero">
        <div class="home-copy">
          <img class="home-logo" src="/1000media-logo.png" alt="1000media">
          <h1 class="home-title">Thumbnails</h1>
        </div>

        <div class="project-grid" aria-label="Thumbnail projects">
          <button id="openZoomex" class="project-tile" type="button">
            <span class="project-logo-wrap">
              <img class="project-logo" src="/zoomex-logo.png" alt="ZOOMEX">
            </span>
            <span class="project-copy">
              <span class="project-name">Zoomex</span>
              <span class="project-role">Thumbnail agent</span>
            </span>
            <span class="project-action">Open</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/leverage-logo.png" alt="Leverage Edu">
            </span>
            <span class="project-copy">
              <span class="project-name">Leverage Edu</span>
              <span class="project-role">Template pending</span>
            </span>
            <span class="project-status">Pending</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/abh-logo.png" alt="Africa Business Heroes">
            </span>
            <span class="project-copy">
              <span class="project-name">Africa Business Heroes</span>
              <span class="project-role">Template pending</span>
            </span>
            <span class="project-status">Pending</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-logo-wrap client-logo-wrap">
              <img class="project-logo client-logo" src="/interfaith-logo.png" alt="Interfaith">
            </span>
            <span class="project-copy">
              <span class="project-name">Interfaith</span>
              <span class="project-role">Template pending</span>
            </span>
            <span class="project-status">Pending</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-mark">DE</span>
            <span class="project-copy">
              <span class="project-name">Dentiste</span>
              <span class="project-role">Template pending</span>
            </span>
            <span class="project-status">Pending</span>
          </button>

          <button class="project-tile project-tile-pending" type="button" disabled>
            <span class="project-mark">SY</span>
            <span class="project-copy">
              <span class="project-name">Siyata</span>
              <span class="project-role">Template pending</span>
            </span>
            <span class="project-status">Pending</span>
          </button>
        </div>
      </section>
    </main>

    <main id="zoomexView" class="app-shell" hidden>
      <section class="workspace">
        <header class="topbar">
          <div class="brand-lockup">
            <button id="backHome" class="home-back" type="button">1000media</button>
            <img class="zoomex-logo" src="/zoomex-logo.png" alt="ZOOMEX">
            <div class="brand-meta">
              <h1>Thumbnail agent</h1>
            </div>
            <p id="statusLine" class="sr-only" aria-live="polite">Checking setup...</p>
          </div>
          <div id="progressPanel" class="progress-panel">
            <div class="progress-head">
              <span id="progressLabel">Ready to create.</span>
              <span id="progressPercent">0%</span>
            </div>
            <div class="progress-track" aria-hidden="true">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressMeta" class="progress-meta">Add a title and script, then create a thumbnail.</div>
          </div>
        </header>

        <section class="studio-layout">
          <section class="panel control-panel">
            <div class="grid">
              <label class="dropzone title-card">
                <span>Title</span>
                <input id="titleInput" type="text" autocomplete="off" placeholder="Enter the title here...">
                <small>Use | to force the line break.</small>
              </label>
            </div>

            <div class="dropzone script-card">
              <span>Script</span>
              <textarea id="scriptText" rows="15" placeholder="Paste your script here..."></textarea>
            </div>

          </section>

          <section class="result-panel">
            <div class="create-panel">
              <button id="createBtn" class="primary-btn" type="button">Create Thumbnail</button>
            </div>

            <div class="preview-stage">
              <div class="reference-row">
                <label class="reference-upload preview-reference" for="personReference">
                  <input id="personReference" type="file" accept="image/*">
                  <span id="referenceFileName">Want a specific person? Upload their photo.</span>
                </label>
              </div>
              <div class="preview-wrap">
                <img id="preview" alt="Generated thumbnail preview">
              </div>
              <a id="downloadLink" class="secondary-btn" href="#" download hidden>Download PNG</a>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>

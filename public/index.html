<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thumbnail Agent</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div class="brand-lockup">
            <img class="zoomex-logo" src="/zoomex-logo.png" alt="ZOOMEX">
            <div class="brand-meta">
              <h1>Thumbnail agent</h1>
              <p class="brand-subline">ZOOMEX template · Blinker Bold · 9:16 vertical</p>
            </div>
            <p id="statusLine" class="sr-only" aria-live="polite">Checking setup...</p>
          </div>
          <button id="createBtn" class="primary-btn" type="button">Create Thumbnail</button>
        </header>

        <section class="studio-layout">
          <section class="panel control-panel">
            <div class="grid">
              <label class="dropzone title-card">
                <span>Title</span>
                <input id="titleInput" type="text" autocomplete="off" placeholder="Enter the title here...">
                <small>Use | to force the line break.</small>
              </label>
            </div>

            <label class="dropzone script-card">
              <span>Script</span>
              <textarea id="scriptText" rows="15" placeholder="Paste your script here..."></textarea>
            </label>

          </section>

          <section class="result-panel">
            <div id="progressPanel" class="progress-panel">
              <div class="progress-head">
                <span id="progressLabel">Ready to create.</span>
                <span id="progressPercent">0%</span>
              </div>
              <div class="progress-track" aria-hidden="true">
                <div id="progressFill" class="progress-fill"></div>
              </div>
              <div id="progressMeta" class="progress-meta">Add a title and script, then create a thumbnail.</div>
            </div>

            <div class="preview-stage">
              <div class="preview-wrap">
                <img id="preview" alt="Generated thumbnail preview">
              </div>
              <a id="downloadLink" class="secondary-btn" href="#" download hidden>Download PNG</a>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
